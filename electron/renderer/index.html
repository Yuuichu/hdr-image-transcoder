<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
    <title>HDR Image Transcoder</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar">
        <div>
          <h1>HDR Image Transcoder</h1>
          <p class="subtitle">Convert HDR still images with the local Python pipeline.</p>
        </div>
        <div id="statusBadge" class="status-badge idle">Idle</div>
      </section>

      <section class="layout">
        <form id="convertForm" class="panel">
          <div class="field-group">
            <label>Input</label>
            <div class="button-row">
              <button id="pickFileButton" type="button">Choose File</button>
              <button id="pickFilesButton" type="button">Choose Files</button>
              <button id="pickDirectoryButton" type="button">Choose Folder</button>
            </div>
            <div id="inputPath" class="path-display empty">No input selected</div>
          </div>

          <div class="field-group">
            <label>Output Folder</label>
            <div class="button-row">
              <button id="pickOutputButton" type="button">Choose Folder</button>
              <button id="clearOutputButton" type="button" class="secondary">Use Default</button>
            </div>
            <div id="outputPath" class="path-display empty">Default output location</div>
          </div>

          <div class="field-grid">
            <div class="field-group">
              <label for="formatSelect">Output Format</label>
              <select id="formatSelect" title="Output format for the converted image">
                <option value="gainmap" title="Works in SDR viewers and shows HDR on supported displays. Best compatibility.">Gainmap AVIF</option>
                <option value="jxl" title="Native float32 HDR. Best compression and quality.">JPEG XL HDR</option>
                <option value="ultrahdr" title="JPEG with HDR gain map. Widely compatible with Google Photos and Android.">Ultra HDR JPEG</option>
                <option value="avif" title="10-bit PQ HDR AVIF. Broad browser support.">Standard HDR AVIF</option>
                <option value="heif" title="10-bit PQ HEVC HDR. Native on Apple devices.">HEIF HDR</option>
              </select>
            </div>

            <div class="field-group">
              <label for="qualityInput" title="Output quality, 0-100. Higher values produce larger files with better fidelity.">Quality</label>
              <input id="qualityInput" type="number" min="0" max="100" step="1" value="95">
            </div>

            <div class="field-group">
              <label for="speedInput" title="Encoder speed, 0-10. 0 = slowest / best compression, 10 = fastest.">Speed</label>
              <input id="speedInput" type="number" min="0" max="10" step="1" value="6">
            </div>

            <div class="field-group">
              <label for="headroomInput" title="Maximum gainmap headroom cap in stops. 0 = no cap, let the encoder decide.">Max Headroom</label>
              <input id="headroomInput" type="number" min="0" step="0.1" value="0">
            </div>

            <div class="field-group">
              <label for="headroomSdrInput" title="SDR base image tonemap headroom in stops. Higher values preserve more highlight detail in the SDR base.">Base Headroom</label>
              <input id="headroomSdrInput" type="number" min="0.1" step="0.1" value="2.0">
            </div>
          </div>

          <label class="check-row" title="Encode with mathematically lossless compression. Only available for JPEG XL output.">
            <input id="losslessInput" type="checkbox">
            <span>Lossless JPEG XL</span>
          </label>

          <div class="action-row">
            <button id="startButton" type="submit" class="primary">Start Conversion</button>
            <button id="cancelButton" type="button" class="danger" disabled>Cancel</button>
          </div>

          <div id="summary" class="summary">Ready.</div>
        </form>

        <section class="log-panel">
          <div class="log-header">
            <h2>Log</h2>
            <button id="clearLogButton" type="button" class="secondary">Clear</button>
          </div>
          <pre id="logOutput" class="log-output"></pre>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
